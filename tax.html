<!DOCTYPE html>
<html>
 
<body>
<title>A Good Tax Title</title>
<h2>Pierce's tax table computation</h2>

<form>
    <label for="income">Enter income </label>
    <input type="number" id="income" value="5000"> <br><br>

    <label for="baseRate">Enter the base tax rate </label>
    <input type="number" id="baseRate" value="0.05" step="0.01"> <br><br>

    <label for="cutoff">Enter the cut off </label>
    <input type="number" id="cutoff" value="7500"> <br><br>

    <label for="extRate">Enter the extended rate </label>
    <input type="number" id="extRate" value="0.15" step="0.01"> <br><br>

    <input type="button" value="Show tax table" onclick="doTax()">

</form>

<p id="result">text</p>

<form>
    <input type="radio" id="power" name="operation"
        value="exponent" onclick="chooseOp()">
    <label for="power">Power</label><br>

    <input type="radio" id="sum" name="operation"
           value="add" onclick="chooseOp()">
    <label for="sum">Sum</label><br>

    <input type="radio" id="modu" name="operation"
           value="mod" onclick="chooseOp()">
    <label for="modu">Mod</label><br>
</form>

<p id="opResult">text</p>

<script>

function chooseOp() {

    let income = Number(document.getElementById("income").value);
    let baseRate = Number(document.getElementById("baseRate").value);

    let radios = document.getElementsByName("operation");

    let result = "";
    let value = 0;

    for (let i = 0; i < radios.length; i++) {

        if (radios[i].checked) {

            if (radios[i].value === "exponent") {
                value = income ** baseRate;
                result = income + " ^ " + baseRate + " is " + value;
            }

            else if (radios[i].value === "add") {
                value = income + baseRate;
                result = income + " + " + baseRate + " is " + value;
            }

            else if (radios[i].value === "mod") {
                value = income % baseRate;
                result = income + " % " + baseRate + " is " + value;
            }

        }
    }

    document.getElementById("opResult").innerHTML = result;
}


function doTax() {
    let income = Number(document.getElementById("income").value);
    let cutoff = Number(document.getElementById("cutoff").value);
    let baseRate = Number(document.getElementById("baseRate").value);
    let extRate = Number(document.getElementById("extRate").value);

    let taxTable = "";

    for (let i = 1; i <= 5; i++) {

        let incomeLevel = income * i;
        let tax = 0;

        if (incomeLevel <= cutoff) {
            tax = incomeLevel * baseRate;
        } else {
            tax = (cutoff * baseRate) +
                  ((incomeLevel - cutoff) * extRate);
        }

        taxTable += "incomeLevel " + incomeLevel +
                    " is " + tax + "; ";
    }

    document.getElementById("result").innerHTML =
        "Taxes are: " + taxTable;
}

</script>

</body>
</html>
