<!DOCTYPE html>
<html>
 <title>villain html</title>
<body>

<h2>Villains by </h2>

<form>
    <label for="secret_villain">Funny Man</label>
    <input type ="password" id="secret_villain" value="Joker"> <br><br>

    <label for="guess_villain">Guess the villain </label>
    <input type="text" id="guess_villain"><br><br>

    <input type="button" value="Check the guess" onclick="checkVillain()">
</form>

<p id="result">Caught: 0 | Got Away: 0</p>

<script>

let caught = 0;
let gotAway = 0;

function checkVillain() {

    let secret = document.getElementById("secret_villain").value;
    let guess = document.getElementById("guess_villain").value;

    if (secret === guess) {
        caught++;
        alert("You caught them");
    } else {
        gotAway++;
        alert("Maybe next time");
    }

    document.getElementById("result").innerHTML =
        "Caught: " + caught + " | Got Away: " + gotAway;
}

</script>

</body>
</html>
